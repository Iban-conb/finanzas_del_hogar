<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fondo con relleno seguro para maskable (padding ~10%) -->
  <rect width="192" height="192" fill="#1A3A5C"/>
  <!-- Icono cartera centrado, escala ~60% del canvas = 115px, centrado en 96,96 -->
  <!-- Cuerpo cartera -->
  <rect x="38" y="68" width="116" height="78" rx="10" fill="none" stroke="#6AB4F0" stroke-width="8"/>
  <!-- Banda superior -->
  <rect x="38" y="88" width="116" height="22" fill="#6AB4F0" opacity="0.35"/>
  <!-- Tarjeta abajo izquierda -->
  <rect x="52" y="116" width="34" height="13" rx="5" fill="#6AB4F0"/>
  <!-- Bolsillo derecho -->
  <rect x="106" y="80" width="48" height="44" rx="7" fill="#0D2137"/>
  <rect x="106" y="80" width="48" height="44" rx="7" fill="#6AB4F0" opacity="0.2" stroke="#6AB4F0" stroke-width="2"/>
  <!-- Moneda en bolsillo -->
  <circle cx="130" cy="102" r="10" fill="#6AB4F0"/>
  <text x="130" y="107" text-anchor="middle" fill="#1A3A5C" font-size="11" font-weight="900" font-family="sans-serif">€</text>
</svg>
